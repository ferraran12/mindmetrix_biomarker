name: mindmetrix_biomarker CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:

  test-publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --locked
        
      - name: Install package
        run: uv pip install -e .
        
      - name: Run tests
        run: uv run pytest
        
      - name: Build package
        run: uv build

      - name: Deploy to TestPyPi
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository_url: https://test.pypi.org/legacy/
